# brailix CI — lint and type-check, plus unit tests on Linux and Windows.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv stopped publishing floating major tags with v8 — pin the
        # exact (immutable) release tag.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Mypy (type-check)
        run: uv run mypy brailix

  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OS when one fails — we want both results.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # Installs the project + the `dev` dependency group (pytest plus the
      # tokenizer / pinyin / LaTeX adapters the core test suite exercises),
      # plus the light optional extras whose tests would otherwise skip:
      # docx input (python-docx/lxml/olefile), MIDI + ABC score input
      # (mido/partitura/abc-xml-converter) and the Japanese analyzers
      # (fugashi/sudachi with their dictionaries). The heavyweight ML
      # extras (hanlp / g2pw) stay out — their adapters are thin wrappers
      # and the model downloads dwarf the suite.
      - name: Install dependencies
        run: uv sync --extra docx --extra music --extra fugashi --extra sudachi

      - name: Run the test suite
        run: uv run pytest
